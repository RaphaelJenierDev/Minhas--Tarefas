<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jenier Soluções | Painel de Produtividade</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="dashboard">

    <div class="clock-container">

        <div class="clock-wrapper">

            <div id="relogio">00:00:00</div>

            <div class="clock-info">

                <span id="periodo">AM</span>

                <div class="status-dot"></div>

            </div>

        </div>

    </div>

    <div class="task-card">

        <div class="team-circle">

            <img src="./img/equipe-jenier.png" alt="Equipe Jenier">

        </div>

        <div class="input-area">

            <input
                type="text"
                class="input-task"
                placeholder="O que tenho que fazer..."
            >

            <button class="button-add-task">

                Adicionar

            </button>

        </div>

        <div class="filters">

            <button onclick="filtrarTarefas('todas')">

                Todas

            </button>

            <button onclick="filtrarTarefas('pendentes')">

                Pendentes

            </button>

        </div>

        <ul class="list-tasks"></ul>

    </div>

</div>

<script src="js/script.js"></script>

</body>

</html>
