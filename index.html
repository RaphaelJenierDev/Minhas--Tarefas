<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>Jenier Soluções</title>
</head>
<body>
    <div class="logo-container">
        <img src="img/fundo.png" alt="Logo" class="brand-logo">
    </div>

    <div class="dashboard">
        <header class="clock-panel">
            <span id="relogio">00:00:00</span>
        </header>

        <section class="task-card">
            <div class="input-area">
                <input type="text" class="input-task" placeholder="O que tenho que fazer...">
                <button class="button-add-task">Adicionar</button>
            </div>
            <ul class="list-tasks"></ul>
        </section>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
