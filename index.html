<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>JenierSolucoes - Todo list</title>
</head>
<body>
    <div class="container">
        <div id="relogio">00:00:00</div>
        
        <input class="input-task" placeholder="O que tenho que fazer...">
        <button class="button-add-task">Adicionar</button>

        <div class="filters">
            <button onclick="filtrarTarefas('todas')">Todas</button>
            <button onclick="filtrarTarefas('pendentes')">Pendentes</button>
        </div>

        <ul class="list-tasks"></ul>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
