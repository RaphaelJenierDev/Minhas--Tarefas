<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>JenierSolucoes - Todo List</title>
</head>
<body>

    <div class="dashboard-wrapper">
        
        <div class="coluna-esquerda">
            
            <div class="header-dashboard">
                <div class="logo-jenier">
                    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <ellipse cx="16" cy="13" rx="7" ry="7.5" stroke="#00d4ff" stroke-width="1.8" fill="none"/>
                        <line x1="13" y1="20.5" x2="19" y2="20.5" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
                        <line x1="13.5" y1="22.5" x2="18.5" y2="22.5" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
                        <line x1="16" y1="5" x2="16" y2="3" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
                        <line x1="22" y1="7" x2="23.5" y2="5.5" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
                        <line x1="10" y1="7" x2="8.5" y2="5.5" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
                        <line x1="24" y1="13" x2="26" y2="13" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
                        <line x1="8" y1="13" x2="6" y2="13" stroke="#00d4ff" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                    <span>JENIER <em>SERVICES</em></span>
                </div>

                <div id="saudacao">Carregando...</div>
                
                <div class="clock-panel">
                    <span id="relogio">00:00:00</span>
                </div>
                <div class="data-display" id="data-display">--/--/----</div>
            </div>

            <div class="container">
                <div class="input-wrapper">
                    <input class="input-task" placeholder="O que tenho que fazer...">
                    <button id="btn-mic" type="button" title="Falar tarefa">🎤</button>
                    <button class="button-add-task">Adicionar</button>
                </div>
                
                <ul class="list-tasks"></ul>

                <div class="consultor-container" style="margin-top: 25px; padding: 18px; background: rgba(0, 0, 0, 0.45); border-radius: 8px; border: 1px solid #00d4ff33; box-shadow: 0 0 15px rgba(0, 212, 255, 0.05);">
                    <h3 style="color: #00d4ff; margin: 0; font-family: 'Orbitron', sans-serif; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px;">
                        🧠 Insight do Consultor
                    </h3>
                    <p id="consultor-feedback" style="color: #fff; font-family: 'Roboto', sans-serif; font-size: 13px; margin: 10px 0 0 0; line-height: 1.5;">
                        Analisando a sua jornada... Insira ou conclua uma tarefa para atualizar o relatório.
                    </p>
                </div>
            </div>

        </div>

        <div class="coluna-right">
            <div class="personagens-container">
                <img src="img/personagens.png" alt="Personagens Jenier">
            </div>
        </div>

    </div>
<script type="importmap">
  {
    "imports": {
      "@google/generative-ai": "https://esm.run/@google/generative-ai"
    }
  }
</script>
<script src="scripts.js"></script>
</body>
</html>
