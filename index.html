<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <title>JenierSolucoes - Todo list</title>
</head>

<body>
    <div class="dashboard-wrapper">
        
        <div class="header-dashboard">
            <div id="saudacao">Carregando...</div>
            <div class="clock-panel">
                <span id="relogio">00:00:00</span>
            </div>
        </div>

        <div class="container">
            <div class="input-wrapper">
                <input class="input-task" placeholder="O que tenho que fazer...">
                <button id="btn-mic" title="Falar tarefa">🎤</button>
                <button class="button-add-task">Adicionar</button>
            </div>

            <ul class="list-tasks">
                </ul>
        </div>

    </div>

    <script src="scripts.js"></script>
</body>
</html>
