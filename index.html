<div class="dashboard">

    <header class="clock-header">

        <div class="clock-box">

            <span id="hora">00:00:00</span>

            <div class="period-box">
                <span id="periodo">AM</span>
                <div class="pulse"></div>
            </div>

        </div>

    </header>

    <section class="task-card">

        <div class="photo-wrapper">

            <img
                src="./img/equipe-jenier.png"
                alt="Equipe Jenier"
                class="photo-team">

        </div>

        <div class="input-area">

            <input
                type="text"
                class="input-task"
                placeholder="O que tenho que fazer...">

            <button class="button-add-task">
                Adicionar
            </button>

        </div>

        <div class="filters">

            <button onclick="filtrarTarefas('todas')">
                Todas
            </button>

            <button onclick="filtrarTarefas('pendentes')">
                Pendentes
            </button>

        </div>

        <ul class="list-tasks"></ul>

    </section>

</div>
